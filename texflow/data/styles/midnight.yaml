---
name: Midnight
description: True dark mode with deep navy background, cool blue-white text, electric accents
packages:
  - titlesec
  - xcolor
  - parskip
preamble:
  - \definecolor{pageBg}{HTML}{0D1117}
  - \definecolor{bodyText}{HTML}{C9D1D9}
  - \definecolor{heading}{HTML}{58A6FF}
  - \definecolor{accent}{HTML}{1F6FEB}
  - \definecolor{highlight}{HTML}{F78166}
  - \pagecolor{pageBg}
  - \color{bodyText}
  - \titleformat{\section}{\Large\bfseries\sffamily\color{heading}}{}{0em}{}[\color{accent}\titlerule]
  - \titleformat{\subsection}{\large\bfseries\sffamily\color{heading}}{}{0em}{}
  - \titleformat{\subsubsection}{\normalsize\bfseries\color{highlight}}{}{0em}{}
  - \hypersetup{linkcolor=heading,urlcolor=highlight,citecolor=accent}
---
